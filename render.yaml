# Render Blueprint — https://render.com/docs/blueprint-spec
# One free web service running the FastAPI app. Render reads this file when you
# create a "Blueprint" from the repo and provisions everything automatically.
services:
  - type: web
    name: cta-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true          # redeploy on every push to the connected branch
    envVars:
      - key: CTA_API_KEY
        sync: false           # you set this in the Render dashboard, never in git
      - key: CTA_BUS_KEY
        sync: false           # optional — enables bus mode
